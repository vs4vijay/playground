# support x86 only
# Open port 27018 for UDP for Counter-Strike server
# mkdir -p /home/ubuntu/cs
# 
# Caddy config:
# cs.$DOMAIN:443 {
#   @ws path /websocket
#   handle @ws {
#     reverse_proxy counter-strike:27016
#   }
#   # Cache valve.zip for 1 month (still behind auth)
#   @valve path /valve.zip
#   handle @valve {
#     reverse_proxy counter-strike:27016 {
#       header_down -Cache-Control
#       header_down -Pragma
#       header_down -Expires
#     }
#     header Cache-Control "private, max-age=2592000"
#     header ETag "valve-v1"
#   }
#   # Everything else protected
#   handle {
#     authorize with admin_policy
#     reverse_proxy counter-strike:27016
#   }
# }

services:
  counter-strike-init:
    container_name: counter-strike-init
    image: cm2network/steamcmd:latest
    user: "0:0"
    environment:
      STEAM_APP_ID: ${STEAM_APP_ID:-90}
      STEAM_INSTALL_DIR: ${STEAM_INSTALL_DIR:-/home/steam/cs}
      ARCHIVE_NAME: ${ARCHIVE_NAME:-valve.zip}
      FORCE_DOWNLOAD: ${FORCE_DOWNLOAD:-0}
      STEAMCMD_BIN: ${STEAMCMD_BIN:-/home/steam/steamcmd/steamcmd.sh}
      DEBIAN_FRONTEND: noninteractive
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        mkdir -p /output
        ARCHIVE_PATH="/output/$$ARCHIVE_NAME"
        TMP_ARCHIVE_PATH="/output/.tmp-$$ARCHIVE_NAME"

        # If Docker or a prior interrupted run left a directory at archive path, clean it.
        if [ -d "$$ARCHIVE_PATH" ]; then
          echo "Found directory at $$ARCHIVE_PATH; removing it so archive can be created."
          rm -rf "$$ARCHIVE_PATH"
        fi

        if [ "$$FORCE_DOWNLOAD" = "1" ]; then
          echo "FORCE_DOWNLOAD=1 set; rebuilding archive at $$ARCHIVE_PATH"
          rm -f "$$ARCHIVE_PATH"
        else
          if [ -s "$$ARCHIVE_PATH" ]; then
            echo "Archive exists at $$ARCHIVE_PATH; skipping download (set FORCE_DOWNLOAD=1 to rebuild)."
            exit 0
          fi
        fi

        if ! command -v zip >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1 || ! command -v tar >/dev/null 2>&1; then
          mkdir -p /var/lib/apt/lists/partial
          apt-get update && apt-get install -y --no-install-recommends zip curl ca-certificates xz-utils
          rm -rf /var/lib/apt/lists/*
        fi

        if [ ! -x "$$STEAMCMD_BIN" ]; then
          echo "steamcmd executable not found or not executable at: $$STEAMCMD_BIN" >&2
          exit 1
        fi

        mkdir -p "$$STEAM_INSTALL_DIR"
        chown -R steam:steam "$$STEAM_INSTALL_DIR"
        export HOME=/home/steam
        mkdir -p "$$HOME"
        chown -R steam:steam "$$HOME"

        if command -v runuser >/dev/null 2>&1; then
          runuser -u steam -- "$$STEAMCMD_BIN" +force_install_dir "$$STEAM_INSTALL_DIR" +login anonymous +app_update "$$STEAM_APP_ID" +quit
        else
          su -s /bin/bash steam -c '"$$STEAMCMD_BIN" +force_install_dir "$$STEAM_INSTALL_DIR" +login anonymous +app_update "$$STEAM_APP_ID" +quit'
        fi

        cd "$$STEAM_INSTALL_DIR"
        test -d cstrike
        test -d valve

        # Download and embed YaPB bot plugin into cstrike
        echo "Fetching latest YaPB release URL..."
        YAPB_URL=$(curl -sf https://api.github.com/repos/yapb/yapb/releases/latest \
          | grep browser_download_url \
          | grep -i linux \
          | head -1 \
          | cut -d '"' -f 4)
        if [ -n "$$YAPB_URL" ]; then
          echo "Downloading YaPB from $$YAPB_URL"
          curl -fL "$$YAPB_URL" -o /tmp/yapb.tar.xz
          mkdir -p /tmp/yapb_extract
          tar -xf /tmp/yapb.tar.xz -C /tmp/yapb_extract
          mkdir -p "$$STEAM_INSTALL_DIR/cstrike/addons"
          cp -r /tmp/yapb_extract/addons/yapb "$$STEAM_INSTALL_DIR/cstrike/addons/"
          mkdir -p /output/yapb /output/metamod
          cp -r /tmp/yapb_extract/addons/yapb/* /output/yapb/
          rm -rf /tmp/yapb.tar.xz /tmp/yapb_extract
          # Register YaPB + amxmodx with Metamod (overrides image plugins.ini via zip)
          mkdir -p "$$STEAM_INSTALL_DIR/cstrike/addons/metamod"
          printf 'linux addons/amxmodx/dlls/amxmodx_mm_i386.so\nlinux addons/yapb/bin/yapb.so\n' \
            > "$$STEAM_INSTALL_DIR/cstrike/addons/metamod/plugins.ini"
          printf 'linux addons/amxmodx/dlls/amxmodx_mm_i386.so\nlinux addons/yapb/bin/yapb.so\n' \
            > /output/metamod/plugins.ini
          echo "YaPB installed into cstrike/addons/yapb/"
        else
          echo "Warning: Could not fetch YaPB download URL; bots will not be available"
        fi

        rm -f "$$TMP_ARCHIVE_PATH"
        zip -r "$$TMP_ARCHIVE_PATH" cstrike valve
        mv -f "$$TMP_ARCHIVE_PATH" "$$ARCHIVE_PATH"
        echo "Counter-Strike archive created successfully: $$ARCHIVE_PATH"
    volumes:
      - "/home/wick/cs:/output"
    restart: "no"

  counter-strike:
    container_name: counter-strike
    # image: yohimik/cs-web-server:latest
    image: yohimik/cs-web-server-metpamx:latest
    command: 
      - "+hostname ${CS_HOSTNAME:-Vizard Counter-Strike Server}"
      - "+map de_dust2"
      - "+maxplayers 14"
      - "+rcon_password ${ADMIN_PASSWORD:-AdminPasswordHere}"
      - "+sv_password ${JOIN_PASSWORD:-}"
      - "+mp_timelimit 20"
      - "+mp_roundtime 5"
      - "+mp_freezetime 5"
      - "+yb_join_after_player 1"
      - "+yb_quota_mode fill"
      - "+yb_quota 6"
      - "+yb_difficulty 2"
      - "+yb_autovacate 1"
      - "+yb_autovacate_keep_slots 1"
      - "+yb_kick_after_player_connect 1"
      # - "amxmodmenu"
      # - "yb add"
    depends_on:
      counter-strike-init:
        condition: service_completed_successfully
    ports:
      - "27016:27016"     # HTTP
      - "27018:27018/udp" # UDP Port
    environment:
      # Public IP, must needed for server to advertise itself correctly
      IP: ${PUBLIC_IP:-192.168.1.123}
      PORT: 27018
    volumes:
      - type: bind
        source: /home/wick/cs/valve.zip
        target: /xashds/public/valve.zip
        # bind:
        #   create_host_path: false
      - type: bind
        source: /home/wick/cs/yapb
        target: /xashds/cstrike/addons/yapb
      - type: bind
        source: /home/wick/cs/metamod/plugins.ini
        target: /xashds/cstrike/addons/metamod/plugins.ini
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    name: web
