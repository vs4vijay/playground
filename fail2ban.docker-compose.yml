services:
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - "/home/ubuntu/data/fail2ban:/data"
      - "/var/log:/var/log:ro"
    environment:
      - TZ=Asia/Kolkata
      - F2B_LOG_TARGET=STDOUT
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=1d
    restart: always
    networks:
      - web

networks:
  web:
    name: web
