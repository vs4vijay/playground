services:
  kasm:
    image: lscr.io/linuxserver/kasm:1.18.0
    container_name: kasm
    privileged: true
    environment:
      - KASM_PORT=443
    ports:
      - 3000:3000
      - 8443:443
    volumes:
      # TODO: Make sure to create these directories
      - /home/ubuntu/data/kasm_opt:/opt
      - /home/ubuntu/data/kasm_profiles:/profiles
    restart: unless-stopped
    networks:
      - internal
      - web

networks:
  internal:
    name: internal
  web:
    name: web
